name: Release CLI (Go)

on:
  push:
    tags:
      - "cli/v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/cli/go.sum

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli/v}" >> $GITHUB_OUTPUT

      - name: Find previous CLI tag
        id: prev_tag
        run: |
          prev=$(git tag --sort=-version:refname | grep '^cli/v' | sed -n '2p')
          echo "tag=${prev}" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --skip=validate
          workdir: apps/cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.prev_tag.outputs.tag }}
          CLI_VERSION: ${{ steps.version.outputs.version }}
