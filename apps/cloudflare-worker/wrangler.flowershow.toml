name = "flowershow-markdown-worker"
main = "src/index.js"
compatibility_date = "2024-03-18"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[[workflows]]
binding = "PUBLISH_WORKFLOW"
name = "publish-workflow"
class_name = "PublishWorkflow"

[[workflows]]
binding = "GITHUB_SYNC_WORKFLOW"
name = "github-sync-workflow"
class_name = "GithubSyncWorkflow"

[[workflows]]
binding = "CUSTOM_DOMAIN_WORKFLOW"
name = "custom-domain-workflow"
class_name = "CustomDomainWorkflow"

# PRODUCTION
[env.production.triggers]
crons = ["0 3 * * *"]

# Secrets set via: wrangler secret put GITHUB_APP_ID --env production
#                  wrangler secret put GITHUB_APP_PRIVATE_KEY --env production
# GITHUB_APP_PRIVATE_KEY must be base64-encoded PEM: base64 -w0 < github-app-private-key.pem
# (PKCS#1 or PKCS#8 — github-api.js auto-converts PKCS#1 at runtime)
#
# Worker → Next.js internal callback secrets:
#   wrangler secret put NEXT_APP_URL --env production      # e.g. https://app.flowershow.app
#   wrangler secret put INTERNAL_API_SECRET --env production  # must match Next.js INTERNAL_API_SECRET

[env.production.vars]
ENVIRONMENT = "production"
POSTHOG_HOST = "https://eu.i.posthog.com"

[[env.production.queues.consumers]]
queue = "flowershow-markdown-queue"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3

[[env.production.r2_buckets]]
binding = "BUCKET"
bucket_name = "flowershow-cloud"

# STAGING
[env.staging.triggers]
crons = ["0 3 * * *"]

[env.staging.vars]
ENVIRONMENT = "staging"
POSTHOG_HOST = "https://eu.i.posthog.com"

[[env.staging.queues.consumers]]
queue = "flowershow-markdown-queue-staging"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3

[[env.staging.r2_buckets]]
binding = "BUCKET"
bucket_name = "flowershow-cloud-staging"

# DEV
[env.dev]
port = 8787
local_protocol = "http"

[env.dev.vars]
ENVIRONMENT = "dev"

[[env.dev.workflows]]
binding = "PUBLISH_WORKFLOW"
name = "publish-workflow"
class_name = "PublishWorkflow"

[[env.dev.workflows]]
binding = "GITHUB_SYNC_WORKFLOW"
name = "github-sync-workflow"
class_name = "GithubSyncWorkflow"

[[env.dev.workflows]]
binding = "CUSTOM_DOMAIN_WORKFLOW"
name = "custom-domain-workflow"
class_name = "CustomDomainWorkflow"

[[env.dev.queues.producers]]
binding = "FILE_PROCESSOR_QUEUE"
queue = "markdown-processing-queue-dev"

[[env.dev.queues.consumers]]
queue = "markdown-processing-queue-dev"
max_batch_size = 10
max_batch_timeout = 1
max_retries = 3